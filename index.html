<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator ELITE - 1 Akun 1 Device</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f9;}
.container { background:white; padding:20px; border-radius:12px; max-width:1000px; margin:auto; box-shadow:0 5px 20px rgba(0,0,0,0.1);}
textarea { width:100%; height:300px; margin-top:10px; font-family:monospace; }
input { padding:8px; width:100%; margin-bottom:10px; }
button { padding:10px 18px; margin:5px 5px 5px 0; border:none; border-radius:6px; cursor:pointer; }
.gen { background:#4CAF50; color:white; }
.copy { background:#2196F3; color:white; }
.xlsx { background:#FF9800; color:white; }
.csv { background:#795548; color:white; }
.login { background:#673AB7; color:white; width:100%; }
.logout { background:#f44336; color:white; }
.stat { margin-top:10px; font-size:14px; }
#app { display:none; }
</style>
</head>
<body>

<div class="container" id="loginBox">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button class="login" onclick="login()">Login</button>
<p id="loginError" style="color:red;"></p>
</div>

<div class="container" id="app">
<h2>🔥 Generator Angka ELITE PRO MAX</h2>
<button class="logout" onclick="logout()">Logout</button>

<label>Masukkan Kode Awal:</label>
<textarea id="startVals">07KJ0010005</textarea>

<label>Jumlah Data per Kode:</label>
<input type="number" id="jumlah" value="100">

<button class="gen" onclick="generate()">Generate</button>
<button class="copy" onclick="copyAll()">Copy</button>
<button class="xlsx" onclick="downloadXLSX()">Download XLSX</button>
<button class="csv" onclick="downloadCSV()">Download CSV</button>

<div class="stat" id="stat"></div>
<textarea id="output"></textarea>
</div>

<script>
let generatedData = [];

function splitCode(code){
    let match = code.match(/^(.*?)(\d+)$/);
    if(!match) return null;
    return { prefix: match[1], number: match[2] };
}

function pad(num,len){
    return num.toString().padStart(len,'0');
}

function nextValue(current){
    return current + 8;
}

function generate(){
    let inputs = document.getElementById("startVals").value.trim().split("\n");
    let jumlah = Number(document.getElementById("jumlah").value);
    generatedData = [];
    let outputText = "";

    for(let code of inputs){
        let parts = splitCode(code.trim());
        if(!parts) continue;

        let prefix = parts.prefix;
        let numStr = parts.number;
        let len = numStr.length;
        let current = parseInt(numStr);

        for(let i=1;i<=jumlah;i++){
            if(i>1) current = nextValue(current);
            let full = prefix + pad(current,len);
            generatedData.push([full]);
            outputText += full + "\n";
        }
    }

    document.getElementById("output").value = outputText;
    document.getElementById("stat").innerHTML =
        "Total Generated: "+generatedData.length;
}

function copyAll(){
    let text = generatedData.map(r => r[0]).join("\n");
    navigator.clipboard.writeText(text);
}

function downloadXLSX(){
    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.aoa_to_sheet(generatedData);
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "ELITE.xlsx");
}

function downloadCSV(){
    let csv = generatedData.map(r=>r[0]).join("\n");
    let blob = new Blob([csv],{type:"text/csv"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "ELITE.csv";
    link.click();
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4mh_ccoXhKyYITNd3otfi-kb2IuQu1rg",
  authDomain: "saktigenerator-cloud-173a2.firebaseapp.com",
  projectId: "saktigenerator-cloud-173a2",
  storageBucket: "saktigenerator-cloud-173a2.firebasestorage.app",
  messagingSenderId: "591213700785",
  appId: "1:591213700785:web:f1975023d8e4c26bb7e490"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function getDeviceID(){
    let id = localStorage.getItem("elite_device_id");
    if(!id){
        id = crypto.randomUUID();
        localStorage.setItem("elite_device_id", id);
    }
    return id;
}

window.login = async function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const deviceID = getDeviceID();
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);

        if(!snap.exists()){
            await setDoc(userRef, { deviceID: deviceID });
        } else {
            const savedID = snap.data().deviceID;
            if(savedID && savedID !== deviceID){
                alert("Akun sudah digunakan di device lain!");
                await signOut(auth);
                return;
            } else {
                await updateDoc(userRef, { deviceID: deviceID });
            }
        }

    } catch (error) {
        document.getElementById("loginError").innerText = error.message;
    }
}

window.logout = function(){
    signOut(auth);
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
    } else {
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});
</script>

</body>
</html>
