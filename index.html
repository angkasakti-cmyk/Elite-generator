<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Generator PRO</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; padding:20px; background:#f4f6f9;}
.container { background:white; padding:20px; border-radius:12px; max-width:900px; margin:auto; box-shadow:0 5px 20px rgba(0,0,0,0.1);}
textarea { width:100%; height:220px; margin-top:10px; font-family:monospace; }
input { padding:8px; width:100%; margin-bottom:10px; }
button { padding:10px 18px; margin:5px 5px 5px 0; border:none; border-radius:6px; cursor:pointer; }
.gen { background:#4CAF50; color:white; }
.copy { background:#2196F3; color:white; }
.xlsx { background:#FF9800; color:white; }
.csv { background:#795548; color:white; }
.loginbtn { background:#673AB7; color:white; width:100%; }
.logout { background:#f44336; color:white; }
#app { display:none; }
</style>
</head>
<body>

<div class="container" id="loginBox">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button class="loginbtn" onclick="login()">Login</button>
<p id="loginError" style="color:red;"></p>
</div>

<div class="container" id="app">
<h2>Elite Generator PRO</h2>
<button class="logout" onclick="logout()">Logout</button>
<label>Kode Awal:</label>
<textarea id="startVals">07KJ0010005</textarea>
<label>Jumlah Data:</label>
<input type="number" id="jumlah" value="100">
<button class="gen" onclick="generate()">Generate</button>
<button class="copy" onclick="copyAll()">Copy</button>
<button class="xlsx" onclick="downloadXLSX()">Download XLSX</button>
<button class="csv" onclick="downloadCSV()">Download CSV</button>
<textarea id="output"></textarea>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4mh_ccoXhKyYITNd3otfi-kb2IuQu1rg",
  authDomain: "saktigenerator-cloud-173a2.firebaseapp.com",
  projectId: "saktigenerator-cloud-173a2",
  storageBucket: "saktigenerator-cloud-173a2.firebasestorage.app",
  messagingSenderId: "591213700785",
  appId: "1:591213700785:web:f1975023d8e4c26bb7e490"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function getDeviceID(){
    let id = localStorage.getItem("elite_device_id");
    if(!id){
        id = crypto.randomUUID();
        localStorage.setItem("elite_device_id", id);
    }
    return id;
}

window.login = async function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try{
        const userCredential = await signInWithEmailAndPassword(auth,email,password);
        const user = userCredential.user;
        const deviceID = getDeviceID();
        const userRef = doc(db,"users",user.uid);
        const snap = await getDoc(userRef);
        if(!snap.exists()){
            await setDoc(userRef,{deviceID:deviceID});
        } else {
            const savedID = snap.data().deviceID;
            if(savedID && savedID !== deviceID){
                alert("Akun sudah digunakan di device lain!");
                await signOut(auth);
            }
        }
    }catch(e){
        document.getElementById("loginError").innerText = e.message;
    }
}

window.logout = async function(){
    await signOut(auth);
}

onAuthStateChanged(auth,(user)=>{
    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
    } else {
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

// ===== ORIGINAL FORMULA =====
let generatedData = [];

function nextValue(current){
    let last2 = current % 100;
    let last3 = current % 1000;
    let ribuan = Math.floor((current % 10000) / 1000);
    let lastDigit = current % 10;

    if (last3 >= 990 && last3 <= 993) return current + ((ribuan===4)?15:16);
    if (last3 >= 994 && last3 <= 999) return current + ((ribuan===4)?5:6);
    if (last2 >= 40 && last2 <= 42) return current + 17;
    if (last2 >= 43 && last2 <= 49) return current + 7;
    if (lastDigit === 0 || lastDigit === 1) return current + 18;
    return current + 8;
}

window.generate = function(){
    let inputs=document.getElementById("startVals").value.trim().split("\n");
    let jumlah=Number(document.getElementById("jumlah").value);
    generatedData=[];
    let outputText="";
    for(let code of inputs){
        let match=code.match(/^(.*?)(\d+)$/);
        if(!match)continue;
        let prefix=match[1],numStr=match[2],len=numStr.length,current=parseInt(numStr);
        for(let i=1;i<=jumlah;i++){
            if(i>1)current=nextValue(current);
            let full=prefix+current.toString().padStart(len,'0');
            generatedData.push([full]);
            outputText+=full+"\n";
        }
    }
    document.getElementById("output").value=outputText;
}

window.copyAll = function(){
    navigator.clipboard.writeText(generatedData.map(r=>r[0]).join("\n"));
}

window.downloadXLSX = function(){
    let wb=XLSX.utils.book_new();
    let ws=XLSX.utils.aoa_to_sheet(generatedData);
    XLSX.utils.book_append_sheet(wb,ws,"Data");
    XLSX.writeFile(wb,"ELITE.xlsx");
}

window.downloadCSV = function(){
    let csv=generatedData.map(r=>r[0]).join("\n");
    let blob=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="ELITE.csv";
    a.click();
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
